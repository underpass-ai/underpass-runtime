# -- Number of replicas
replicaCount: 1

image:
  # -- Container image registry + repository
  repository: ghcr.io/underpass-ai/underpass-runtime
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (defaults to Chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []
# -- Override the release name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- ServiceAccount name (generated if empty)
  name: ""

# -- Pod-level annotations
podAnnotations: {}

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 50053

# -- Resource requests and limits
resources:
  requests:
    cpu: 250m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi
    ephemeral-storage: 4Gi

autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 75

# -- Node selector
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}

# ---------------------------------------------------------------------------
# TLS — HTTP server
# ---------------------------------------------------------------------------
tls:
  # -- TLS mode: disabled, server, mutual
  mode: disabled
  # -- Existing Secret containing cert, key, and (for mutual) client CA
  existingSecret: ""
  # -- Mount path for TLS secrets
  mountPath: /var/run/underpass-runtime/tls
  keys:
    # -- Key in the secret for the TLS certificate
    cert: tls.crt
    # -- Key in the secret for the TLS private key
    key: tls.key
    # -- Key in the secret for the client CA (required for mutual)
    clientCa: ca.crt

# ---------------------------------------------------------------------------
# TLS — NATS client
# ---------------------------------------------------------------------------
natsTls:
  # -- NATS TLS mode: disabled, server, mutual
  mode: disabled
  # -- Existing Secret containing NATS TLS certificates
  existingSecret: ""
  # -- Optional SNI / hostname verification override for the NATS server certificate
  serverName: ""
  # -- Mount path for NATS TLS secrets
  mountPath: /var/run/underpass-runtime/nats-tls
  keys:
    # -- Key in the secret for the CA certificate
    ca: ca.crt
    # -- Key in the secret for the client certificate (mutual only)
    cert: ""
    # -- Key in the secret for the client private key (mutual only)
    key: ""

# ---------------------------------------------------------------------------
# TLS — Valkey client
# ---------------------------------------------------------------------------
valkeyTls:
  # -- Enable TLS for Valkey connections
  enabled: false
  # -- Existing Secret containing Valkey TLS certificates
  existingSecret: ""
  # -- Optional SNI / hostname verification override for the Valkey server certificate
  serverName: ""
  # -- Mount path for Valkey TLS secrets
  mountPath: /var/run/underpass-runtime/valkey-tls
  keys:
    # -- Key in the secret for the CA certificate
    ca: ca.crt
    # -- Key in the secret for the client certificate (mTLS only)
    cert: ""
    # -- Key in the secret for the client private key (mTLS only)
    key: ""

# -- S3/MinIO client TLS configuration (used by artifact store and tool-learning)
s3Tls:
  # -- Enable TLS for S3/MinIO connections
  enabled: false
  # -- Existing Secret containing S3 client TLS certificates
  existingSecret: ""
  # -- Optional SNI / hostname verification override for the S3 server certificate
  serverName: ""
  # -- Mount path for S3 TLS secrets
  mountPath: /var/run/underpass-runtime/s3-tls
  keys:
    # -- Key in the secret for the CA certificate
    ca: ca.crt
    # -- Key in the secret for the client certificate (mTLS only)
    cert: ""
    # -- Key in the secret for the client private key (mTLS only)
    key: ""

# ---------------------------------------------------------------------------
# Runtime configuration
# ---------------------------------------------------------------------------

config:
  # -- Log level: debug, info, warn, error
  logLevel: info
  # -- Workspace backend: local, docker, kubernetes
  workspaceBackend: local
  # -- Service version label (for telemetry)
  version: "0.1.0"
  # -- Environment label (for telemetry)
  environment: production

# -- Workspace storage
workspace:
  # -- Root directory for workspaces (emptyDir mount)
  root: /tmp/workspaces
  # -- Size limit for workspace emptyDir volume
  sizeLimit: 2Gi

# -- Artifact storage
artifacts:
  # -- Root directory for local artifacts (emptyDir mount)
  root: /tmp/artifacts
  # -- Size limit for artifacts emptyDir volume
  sizeLimit: 1Gi
  # -- Artifact backend: local, s3
  backend: local
  s3:
    # -- S3 bucket name
    bucket: workspace-artifacts
    # -- S3 key prefix
    prefix: ""
    # -- S3 endpoint (MinIO or AWS)
    endpoint: ""
    # -- AWS region
    region: us-east-1
    # -- Use path-style URLs (required for MinIO)
    pathStyle: true
    # -- Use HTTPS for S3 connections
    useSSL: false
    # -- Path to CA certificate for S3 TLS (mounted via existingSecret or external)
    caPath: ""
    # -- Reference to an existing Secret with accessKey and secretKey
    existingSecret: ""
    # -- Key in the secret for access key
    accessKeyKey: accessKey
    # -- Key in the secret for secret key
    secretKeyKey: secretKey

# -- Session and invocation stores
stores:
  # -- Store backend: memory, valkey
  backend: memory
  # -- Session TTL in seconds
  sessionTTLSeconds: 86400
  # -- Invocation TTL in seconds
  invocationTTLSeconds: 86400
  # -- Decision TTL in seconds (30 days for audit trail)
  decisionTTLSeconds: 2592000

# -- Valkey (Redis-compatible) configuration
valkey:
  # -- Enable Valkey connection (required when stores.backend=valkey)
  enabled: false
  # -- Valkey host
  host: valkey
  # -- Valkey port
  port: 6379
  # -- Valkey database number
  db: 0
  # -- Reference to existing Secret with Valkey password
  existingSecret: ""
  # -- Key in the secret for password
  passwordKey: password

# -- Event bus configuration
eventBus:
  # -- Event bus type: none, nats
  type: none
  nats:
    # -- NATS server URL
    url: nats://nats:4222
    # -- NATS stream name (optional)
    stream: ""
  # -- Enable outbox pattern (requires Valkey)
  outbox: false

# -- Telemetry configuration
telemetry:
  # -- Telemetry backend: none, memory, valkey
  backend: none
  # -- Telemetry data TTL in seconds
  ttlSeconds: 604800
  # -- Aggregation interval in seconds
  aggregationIntervalSeconds: 300
  otel:
    # -- Enable OpenTelemetry tracing
    enabled: false
    # -- OTLP exporter endpoint
    endpoint: ""
    # -- Allow insecure HTTP for OTLP
    insecure: false
    # -- Path to CA certificate for OTLP TLS
    caPath: ""

# ---------------------------------------------------------------------------
# OpenTelemetry Collector (optional, managed by this chart)
# ---------------------------------------------------------------------------

otelCollector:
  # -- Deploy an OTel Collector sidecar service
  enabled: false
  image:
    repository: docker.io/otel/opentelemetry-collector-contrib
    tag: "0.127.0"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Optional ingress for an external vLLM service used by some deployments
vllm:
  ingress:
    # -- Enable the vLLM ingress resource
    enabled: false
    # -- cert-manager ClusterIssuer used when ingress TLS is enabled
    clusterIssuer: ""
    # -- Hostname served by the ingress
    host: ""
    # -- TLS secret name for the ingress certificate
    tlsSecret: ""
    service:
      # -- Backend Service name exposed by the ingress
      name: vllm-server
      # -- Backend Service port exposed by the ingress
      port: 8000
    mtls:
      # -- Require client certificates at the ingress layer
      enabled: false
      # -- Secret containing the client CA bundle for ingress mTLS
      clientCaSecret: ""

# -- Authentication configuration
auth:
  # -- Auth mode: payload (no auth), trusted_headers
  mode: payload
  # -- Reference to existing Secret with shared token
  existingSecret: ""
  # -- Key in the secret for the shared token
  tokenKey: sharedToken

# -- Tool bundles to disable (comma-separated)
disabledBundles: ""

# ---------------------------------------------------------------------------
# Kubernetes backend (when config.workspaceBackend=kubernetes)
# ---------------------------------------------------------------------------

kubernetesBackend:
  # -- K8s namespace for runner pods
  namespace: ""
  # -- Service account for runner pods
  serviceAccount: ""
  # -- Default runner image
  runnerImage: ""
  # -- Runner image bundles JSON
  imageBundlesJSON: ""
  # -- Init container image
  initImage: ""
  # -- Pod working directory
  workdir: /workspace/repo
  # -- Pod name prefix
  podPrefix: ws
  # -- Pod ready timeout seconds
  readyTimeoutSeconds: 120
  # -- Git auth secret name
  gitAuthSecret: ""
  # -- Pod security
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  readOnlyRootFS: false
  # -- Pod janitor
  janitor:
    enabled: true
    intervalSeconds: 60
    terminalTTLSeconds: 300
    missingSessionGraceSeconds: 120

  # -- Delivery tools (K8s apply, rollout, etc.)
  deliveryTools:
    # -- Enable K8s delivery tools and bind delivery RBAC to the runtime ServiceAccount
    enabled: false
    # -- Target namespace for delivery RBAC (defaults to release namespace)
    namespace: ""
    # -- Optional additional ServiceAccount name created in the target namespace and
    # -- added to the delivery RoleBinding. Empty auto-generates <release>-delivery.
    serviceAccount: ""

  # -- RBAC for runner pod management
  rbac:
    # -- Create Role and RoleBinding for K8s backend
    create: false

# ---------------------------------------------------------------------------
# Prometheus PrometheusRule (alerts)
# ---------------------------------------------------------------------------

prometheusRule:
  # -- Create a PrometheusRule with workspace alerts
  enabled: false
  # -- Additional labels (e.g. release: kube-prometheus-stack)
  labels: {}

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------

networkPolicy:
  # -- Create a NetworkPolicy restricting ingress/egress
  enabled: false
  # -- Additional ingress from rules (e.g. namespaceSelector, podSelector)
  ingressFrom: []

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------

podDisruptionBudget:
  # -- Create a PodDisruptionBudget
  enabled: false
  # -- Minimum available pods (mutually exclusive with maxUnavailable)
  minAvailable: ""
  # -- Maximum unavailable pods
  maxUnavailable: 1

# ---------------------------------------------------------------------------
# Prometheus ServiceMonitor
# ---------------------------------------------------------------------------

serviceMonitor:
  # -- Create a Prometheus ServiceMonitor
  enabled: false
  # -- Additional labels
  labels: {}
  # -- Scrape interval
  interval: 30s
  # -- Scrape path
  path: /metrics

# ---------------------------------------------------------------------------
# Tool Learning CronJobs (Phase 10)
# ---------------------------------------------------------------------------

toolLearning:
  # -- Enable tool-learning CronJobs
  enabled: false

  image:
    # -- Tool-learning container image
    repository: ghcr.io/underpass-ai/underpass-runtime/tool-learning
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Overrides the image tag (defaults to Chart appVersion)
    tag: ""

  # -- CronJob schedules to deploy
  schedules:
    - name: hourly
      cron: "0 * * * *"
    - name: daily
      cron: "0 0 * * *"

  # -- Log level: debug, info, warn, error
  logLevel: info

  # -- Hard policy constraints (0 = disabled)
  constraints:
    maxP95LatencyMs: 0
    maxErrorRate: 0
    maxP95Cost: 0

  # -- S3 / MinIO configuration (telemetry lake + audit)
  s3:
    # -- S3-compatible endpoint
    endpoint: minio:9000
    # -- AWS region
    region: us-east-1
    # -- Use TLS for S3 connections
    useSSL: false
    # -- Bucket for telemetry Parquet lake
    lakeBucket: telemetry-lake
    # -- Bucket for policy audit snapshots
    auditBucket: policy-audit
    # -- Existing Secret with S3 credentials
    existingSecret: ""
    # -- Key in secret for access key
    accessKeyKey: accessKey
    # -- Key in secret for secret key
    secretKeyKey: secretKey

  # -- Valkey configuration (policy store)
  valkey:
    # -- Valkey host
    host: valkey
    # -- Valkey port
    port: 6379
    # -- Valkey database number
    db: 0
    # -- Key prefix for policy entries
    keyPrefix: tool_policy
    # -- Policy TTL
    ttl: 2h
    # -- Existing Secret with Valkey password
    existingSecret: ""
    # -- Key in secret for password
    passwordKey: password

  # -- NATS configuration (policy event publisher)
  nats:
    # -- NATS server URL
    url: nats://nats:4222

  # -- Resource requests and limits
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

  # -- Job active deadline in seconds (10 min)
  activeDeadlineSeconds: 600
  # -- Number of retries before marking job as failed
  backoffLimit: 2
  # -- Maximum delay before starting a missed job (5 min)
  startingDeadlineSeconds: 300
  # -- Number of successful jobs to keep
  successfulJobsHistoryLimit: 3
  # -- Number of failed jobs to keep
  failedJobsHistoryLimit: 3

  # -- Pod annotations
  podAnnotations: {}
  # -- Node selector
  nodeSelector: {}
  # -- Tolerations
  tolerations: []
  # -- Affinity rules
  affinity: {}

# ---------------------------------------------------------------------------
# TLS Certificate Generation (pre-install/pre-upgrade hook)
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# E2E Tests (helm test)
# ---------------------------------------------------------------------------

e2e:
  # -- Enable E2E test Jobs (created as helm.sh/hook: test)
  enabled: false
  image:
    # -- E2E runner image (unified, all tests)
    repository: ghcr.io/underpass-ai/underpass-runtime/e2e-runner
    # -- Image pull policy
    pullPolicy: Always
    # -- Image tag (defaults to Chart appVersion)
    tag: ""
  # -- Existing Secret with client TLS certs for gRPC + NATS (ca.crt, tls.crt, tls.key)
  clientTlsSecret: e2e-client-tls
  # -- Tests to run (id + timeout). Use `helm test` to execute.
  tests:
    - id: "01"
      name: health
      timeout: 120
    - id: "02"
      name: session-lifecycle
      timeout: 300
    - id: "03"
      name: tool-discovery
      timeout: 300
    - id: "04"
      name: recommendations
      timeout: 300
    - id: "05"
      name: invoke-basic
      timeout: 300
    - id: "06"
      name: invoke-policy
      timeout: 300
    - id: "07"
      name: invocation-retrieval
      timeout: 300
    - id: "08"
      name: data-flow
      timeout: 600
    - id: "12"
      name: event-driven-agent
      timeout: 300
    - id: "13"
      name: multi-agent-pipeline
      timeout: 300
    - id: "14"
      name: full-infra-stack
      timeout: 120
    - id: "16"
      name: recommendation-evidence
      timeout: 300
    - id: "18"
      name: policy-driven-recommendations
      timeout: 300
    - id: "19"
      name: neural-ts-recommendations
      timeout: 300
    - id: "21"
      name: agent-feedback-loop
      timeout: 300

# ---------------------------------------------------------------------------
# TLS Certificate Generation (pre-install/pre-upgrade hook)
# ---------------------------------------------------------------------------

certGen:
  # -- Enable automatic TLS certificate generation via Helm hook Job.
  # Reads the shared CA from caSecret and generates runtime server + client certs.
  # Requires the CA secret to exist (deployed by rehydration-kernel or manually).
  enabled: false
  # -- Container image with openssl, curl, and jq (preinstalled)
  image: ghcr.io/underpass-ai/underpass-runtime/cert-gen:v1.0.0
  # -- Name of the existing CA Secret (must contain tls.crt and tls.key)
  caSecret: rehydration-kernel-internal-ca
  # -- Key algorithm: ec (ECDSA)
  keyAlgorithm: ec
  # -- Elliptic curve for ECDSA keys
  keyCurve: prime256v1
  # -- Certificate validity in days
  validityDays: 365

# ---------------------------------------------------------------------------
# MinIO IAM Setup (TL-008 — bucket isolation)
# ---------------------------------------------------------------------------

minioIAM:
  # -- Enable MinIO IAM setup Job (runs as Helm hook)
  enabled: false
  # -- MinIO Client image
  image: docker.io/minio/mc:latest
  # -- MinIO endpoint (with scheme). Set to your MinIO service URL.
  # Use https:// for production; http:// only for in-cluster without TLS.
  endpoint: ""
  # -- Existing Secret with MinIO root credentials
  rootSecret: minio-credentials
  # -- Key in rootSecret for access key
  rootAccessKeyKey: accessKey
  # -- Key in rootSecret for secret key
  rootSecretKeyKey: secretKey

  # -- Existing Secret for workspace-svc S3 user
  workspaceSecret: minio-workspace-svc
  # -- Existing Secret for tool-learning S3 user
  toolLearningSecret: minio-tool-learning

  # -- Bucket names
  buckets:
    # -- Workspace execution artifacts (workspace-svc R/W)
    artifacts: workspace-artifacts
    # -- Telemetry Parquet lake (telemetry-svc W, tool-learning R)
    telemetryLake: telemetry-lake
    # -- Policy audit snapshots (tool-learning R/W)
    policyAudit: policy-audit

  # -- Bucket lifecycle rules (object expiration)
  lifecycle:
    # -- Expire workspace artifacts after N days (0 = disabled)
    artifactsDays: 7
    # -- Expire telemetry Parquet partitions after N days (0 = disabled)
    telemetryLakeDays: 30
    # -- Expire policy audit snapshots after N days (0 = disabled)
    policyAuditDays: 90
