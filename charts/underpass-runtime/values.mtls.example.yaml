# Example: Mutual TLS on all transports.
#
# This file shows how to enable mTLS for HTTP server, NATS, and Valkey.
# Combine with values.production.yaml:
#
#   helm upgrade --install underpass-runtime charts/underpass-runtime \
#     -f charts/underpass-runtime/values.yaml \
#     -f charts/underpass-runtime/values.production.yaml \
#     -f charts/underpass-runtime/values.mtls.example.yaml
#
# Prerequisites:
#   - kubectl create secret generic underpass-runtime-tls \
#       --from-file=tls.crt --from-file=tls.key --from-file=ca.crt
#   - kubectl create secret generic underpass-runtime-nats-tls \
#       --from-file=ca.crt --from-file=tls.crt=client.crt --from-file=tls.key=client.key
#   - kubectl create secret generic underpass-runtime-valkey-tls \
#       --from-file=ca.crt --from-file=tls.crt=client.crt --from-file=tls.key=client.key

tls:
  mode: mutual
  existingSecret: underpass-runtime-tls
  mountPath: /var/run/underpass-runtime/tls
  keys:
    cert: tls.crt
    key: tls.key
    clientCa: ca.crt

natsTls:
  mode: mutual
  existingSecret: underpass-runtime-nats-tls
  mountPath: /var/run/underpass-runtime/nats-tls
  keys:
    ca: ca.crt
    cert: tls.crt
    key: tls.key

valkeyTls:
  enabled: true
  existingSecret: underpass-runtime-valkey-tls
  mountPath: /var/run/underpass-runtime/valkey-tls
  keys:
    ca: ca.crt
    cert: tls.crt
    key: tls.key
