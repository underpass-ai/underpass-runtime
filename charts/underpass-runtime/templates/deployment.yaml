{{- include "underpass-runtime.validateValues" . -}}
{{- $tlsMode := include "underpass-runtime.tlsMode" . -}}
{{- $tls := default (dict) .Values.tls -}}
{{- $natsTls := default (dict) .Values.natsTls -}}
{{- $natsTlsMode := include "underpass-runtime.natsTlsMode" . -}}
{{- $valkeyTls := default (dict) .Values.valkeyTls -}}
{{- $valkeyTlsEnabled := default false $valkeyTls.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "underpass-runtime.fullname" . }}
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "underpass-runtime.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "underpass-runtime.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "underpass-runtime.serviceAccountName" . }}
      automountServiceAccountToken: {{ eq .Values.config.workspaceBackend "kubernetes" }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ if ne $tlsMode "disabled" }}https{{ else }}http{{ end }}
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "underpass-runtime.fullname" . }}
          env:
            {{- /* Valkey password from secret */}}
            {{- if and .Values.valkey.enabled .Values.valkey.existingSecret }}
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.valkey.existingSecret }}
                  key: {{ .Values.valkey.passwordKey }}
            {{- end }}
            {{- /* Auth shared token from secret */}}
            {{- if eq .Values.auth.mode "trusted_headers" }}
            - name: WORKSPACE_AUTH_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (include "underpass-runtime.fullname" .) }}
                  key: {{ .Values.auth.tokenKey }}
            {{- end }}
            {{- /* S3 credentials from secret */}}
            {{- if and (eq .Values.artifacts.backend "s3") .Values.artifacts.s3.existingSecret }}
            - name: ARTIFACT_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifacts.s3.existingSecret }}
                  key: {{ .Values.artifacts.s3.accessKeyKey }}
            - name: ARTIFACT_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.artifacts.s3.existingSecret }}
                  key: {{ .Values.artifacts.s3.secretKeyKey }}
            {{- end }}
          livenessProbe:
            {{- if ne $tlsMode "disabled" }}
            tcpSocket:
              port: {{ .Values.service.port }}
            {{- else }}
            grpc:
              port: {{ .Values.service.port }}
            {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            {{- if ne $tlsMode "disabled" }}
            tcpSocket:
              port: {{ .Values.service.port }}
            {{- else }}
            grpc:
              port: {{ .Values.service.port }}
            {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspaces
              mountPath: {{ .Values.workspace.root }}
            - name: artifacts
              mountPath: {{ .Values.artifacts.root }}
            - name: tmp
              mountPath: /tmp
            {{- if and (ne $tlsMode "disabled") $tls.existingSecret }}
            - name: tls
              mountPath: {{ $tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- if and (ne $natsTlsMode "disabled") $natsTls.existingSecret }}
            - name: nats-tls
              mountPath: {{ $natsTls.mountPath }}
              readOnly: true
            {{- end }}
            {{- if and $valkeyTlsEnabled $valkeyTls.existingSecret }}
            - name: valkey-tls
              mountPath: {{ $valkeyTls.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: workspaces
          emptyDir:
            sizeLimit: {{ .Values.workspace.sizeLimit }}
        - name: artifacts
          emptyDir:
            sizeLimit: {{ .Values.artifacts.sizeLimit }}
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- if and (ne $tlsMode "disabled") $tls.existingSecret }}
        - name: tls
          secret:
            secretName: {{ $tls.existingSecret }}
        {{- end }}
        {{- if and (ne $natsTlsMode "disabled") $natsTls.existingSecret }}
        - name: nats-tls
          secret:
            secretName: {{ $natsTls.existingSecret }}
        {{- end }}
        {{- if and $valkeyTlsEnabled $valkeyTls.existingSecret }}
        - name: valkey-tls
          secret:
            secretName: {{ $valkeyTls.existingSecret }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
