{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "underpass-runtime.fullname" . }}
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "underpass-runtime.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if .Values.valkey.enabled }}
    # Valkey
    - ports:
        - port: {{ .Values.valkey.port }}
          protocol: TCP
    {{- end }}
    {{- if eq .Values.eventBus.type "nats" }}
    # NATS
    - ports:
        - port: 4222
          protocol: TCP
    {{- end }}
    {{- if .Values.telemetry.otel.enabled }}
    # OTLP collector (gRPC + HTTP)
    - ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
    {{- end }}
    {{- if eq .Values.artifacts.backend "s3" }}
    # S3/MinIO
    - ports:
        - port: 443
          protocol: TCP
        - port: 9000
          protocol: TCP
    {{- end }}
    {{- if eq .Values.config.workspaceBackend "kubernetes" }}
    # K8s API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- end }}
{{- end }}
