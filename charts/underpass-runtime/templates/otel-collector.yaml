{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-otel-collector
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "underpass-runtime.fullname" . }}-otel-collector
  ports:
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      protocol: TCP
      name: otlp-http
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-otel-collector
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "underpass-runtime.fullname" . }}-otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "underpass-runtime.fullname" . }}-otel-collector
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          args:
            - "--config=/etc/otel/config.yaml"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 9090
              name: prometheus
            - containerPort: 13133
              name: health
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            {{- if and (ne (include "underpass-runtime.tlsMode" .) "disabled") (default (dict) .Values.tls).existingSecret }}
            - name: otel-tls
              mountPath: /var/run/otel-tls
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.otelCollector.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "underpass-runtime.fullname" . }}-otel-config
        {{- if and (ne (include "underpass-runtime.tlsMode" .) "disabled") (default (dict) .Values.tls).existingSecret }}
        - name: otel-tls
          secret:
            secretName: {{ .Values.tls.existingSecret }}
        {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-otel-config
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            {{- if ne (include "underpass-runtime.tlsMode" .) "disabled" }}
            tls:
              cert_file: /var/run/otel-tls/{{ (default (dict) .Values.tls.keys).cert | default "tls.crt" }}
              key_file: /var/run/otel-tls/{{ (default (dict) .Values.tls.keys).key | default "tls.key" }}
              client_ca_file: /var/run/otel-tls/{{ (default (dict) .Values.tls.keys).clientCa | default "ca.crt" }}
            {{- end }}
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
    exporters:
      prometheus:
        endpoint: 0.0.0.0:9090
        namespace: underpass_runtime
      debug:
        verbosity: basic
        sampling_initial: 2
        sampling_thereafter: 100
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
---
{{- if $.Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-otel-collector
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
    {{- with $.Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "underpass-runtime.fullname" . }}-otel-collector
  endpoints:
    - port: prometheus
      path: /metrics
      interval: {{ $.Values.serviceMonitor.interval }}
{{- end }}
{{- end }}
