{{- if .Values.kubernetesBackend.deliveryTools.enabled }}
{{- $deliveryNamespace := .Values.kubernetesBackend.deliveryTools.namespace | default .Values.kubernetesBackend.namespace | default .Release.Namespace -}}
{{- $deliveryServiceAccount := default (printf "%s-delivery" (include "underpass-runtime.fullname" .)) .Values.kubernetesBackend.deliveryTools.serviceAccount -}}
{{- $runtimeServiceAccount := include "underpass-runtime.serviceAccountName" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $deliveryServiceAccount }}
  namespace: {{ $deliveryNamespace }}
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-delivery
  namespace: {{ $deliveryNamespace }}
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollout"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-delivery
  namespace: {{ $deliveryNamespace }}
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "underpass-runtime.fullname" . }}-delivery
subjects:
  - kind: ServiceAccount
    name: {{ $runtimeServiceAccount }}
    namespace: {{ .Release.Namespace }}
  {{- if or (ne $deliveryServiceAccount $runtimeServiceAccount) (ne $deliveryNamespace .Release.Namespace) }}
  - kind: ServiceAccount
    name: {{ $deliveryServiceAccount }}
    namespace: {{ $deliveryNamespace }}
  {{- end }}
{{- end }}
