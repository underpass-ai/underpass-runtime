{{- if .Values.certGen.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-cert-gen
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: cert-gen
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-cert-gen
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: cert-gen
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "underpass-runtime.fullname" . }}-cert-gen
  labels:
    {{- include "underpass-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: cert-gen
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "underpass-runtime.fullname" . }}-cert-gen
subjects:
  - kind: ServiceAccount
    name: {{ include "underpass-runtime.fullname" . }}-cert-gen
    namespace: {{ .Release.Namespace }}
{{- end }}
