# ---------------------------------------------------------------------------
# Observability Stack — installs in its own namespace (e.g., observability)
# Monitors underpass-runtime in a separate namespace.
# ---------------------------------------------------------------------------

# Namespace where underpass-runtime is deployed (for cross-namespace scraping)
runtimeNamespace: underpass-runtime

# ---------------------------------------------------------------------------
# TLS — shared CA from rehydration-kernel, same trust domain as runtime
# ---------------------------------------------------------------------------
tls:
  # Enable cert-gen hook to generate OTEL Collector server certs
  enabled: false
  # CA secret in runtimeNamespace (created by rehydration-kernel cert-gen)
  caSecret: rehydration-kernel-internal-ca
  # Image with openssl + curl + jq
  certGenImage: ghcr.io/underpass-ai/underpass-runtime/cert-gen:v1.0.0
  # Certificate validity
  validityDays: 365

# ---------------------------------------------------------------------------
# Prometheus + Grafana (kube-prometheus-stack)
# ---------------------------------------------------------------------------
prometheus:
  enabled: true

kube-prometheus-stack:
  fullnameOverride: prometheus

  prometheus:
    prometheusSpec:
      # Scrape ServiceMonitors from ALL namespaces
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorNamespaceSelector: {}
      # Scrape PrometheusRules from ALL namespaces
      ruleSelectorNilUsesHelmValues: false
      ruleNamespaceSelector: {}
      # Retention
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  grafana:
    fullnameOverride: grafana
    adminPassword: underpass-admin
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"
        searchNamespace: ALL
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.{{ .Release.Namespace }}.svc:80
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"([a-f0-9]+)"'
              name: TraceID
              url: "$${__value.raw}"
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://otel-collector-tempo.{{ .Release.Namespace }}.svc:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true

  alertmanager:
    enabled: true

  # Disable components we don't need
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeControllerManager:
    enabled: false

# ---------------------------------------------------------------------------
# Loki (log aggregation)
# ---------------------------------------------------------------------------
loki:
  enabled: true

  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      size: 10Gi
  # Disable unused components
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  gateway:
    enabled: true

# ---------------------------------------------------------------------------
# Promtail (log shipper → Loki)
# ---------------------------------------------------------------------------
promtail:
  enabled: true

  config:
    clients:
      - url: http://loki-gateway.{{ .Release.Namespace }}.svc:80/loki/api/v1/push
    snippets:
      pipelineStages:
        # Parse JSON structured logs
        - json:
            expressions:
              level: level
              msg: msg
              trace_id: trace_id
              span_id: span_id
              session_id: session_id
              tool: tool
        - labels:
            level:
            trace_id:
            session_id:
            tool:

# ---------------------------------------------------------------------------
# OpenTelemetry Collector (receives OTLP traces from runtime)
# ---------------------------------------------------------------------------
otelCollector:
  enabled: true

opentelemetry-collector:
  fullnameOverride: otel-collector
  mode: deployment
  replicaCount: 1

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 5s
        limit_mib: 256
    exporters:
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]

  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP

# ── mTLS overlay for OTEL Collector ──
# When tls.enabled=true, mount the generated cert and configure receivers:
#   opentelemetry-collector.config.receivers.otlp.protocols.grpc.tls:
#     cert_file: /tls/tls.crt
#     key_file: /tls/tls.key
#     client_ca_file: /tls/ca.crt
#   opentelemetry-collector.config.receivers.otlp.protocols.http.tls:
#     cert_file: /tls/tls.crt
#     key_file: /tls/tls.key
#     client_ca_file: /tls/ca.crt
#
# Apply via values overlay: values.mtls.yaml (see INSTALL.md)
