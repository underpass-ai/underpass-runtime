# mTLS overlay — use with: -f values.mtls.yaml
# Requires: tls.enabled=true (generates certs via cert-gen hook)

tls:
  enabled: true

opentelemetry-collector:
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            tls:
              cert_file: /tls/tls.crt
              key_file: /tls/tls.key
              client_ca_file: /tls/ca.crt
          http:
            endpoint: 0.0.0.0:4318
            tls:
              cert_file: /tls/tls.crt
              key_file: /tls/tls.key
              client_ca_file: /tls/ca.crt

  extraVolumes:
    - name: otel-tls
      secret:
        secretName: otel-collector-tls

  extraVolumeMounts:
    - name: otel-tls
      mountPath: /tls
      readOnly: true
