{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-underpass-runtime
  labels:
    grafana_dashboard: "1"
    {{- include "observability-stack.labels" . | nindent 4 }}
data:
  underpass-runtime.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Invocation Rate by Status",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(invocations_total[5m])) by (status)",
              "legendFormat": "{{`{{status}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "title": "Denial Rate by Reason",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(denied_total[5m])) by (reason)",
              "legendFormat": "{{`{{reason}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "title": "P95 Latency by Tool (ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(duration_ms_bucket[5m])) by (tool, le))",
              "legendFormat": "{{`{{tool}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ms" }
          }
        },
        {
          "title": "Tool Success Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(invocations_total{status=\"succeeded\"}[5m])) by (tool) / sum(rate(invocations_total[5m])) by (tool)",
              "legendFormat": "{{`{{tool}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1 }
          }
        },
        {
          "title": "Sessions Created/Closed",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "targets": [
            { "expr": "workspace_sessions_created_total", "legendFormat": "Created" },
            { "expr": "workspace_sessions_closed_total", "legendFormat": "Closed" }
          ]
        },
        {
          "title": "Recommendation Acceptance Rate",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "targets": [
            { "expr": "workspace_recommendation_acceptance_rate" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "steps": [
                { "color": "red", "value": 0 },
                { "color": "yellow", "value": 0.5 },
                { "color": "green", "value": 0.8 }
              ]}
            }
          }
        },
        {
          "title": "First-Tool Success Rate",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 16 },
          "targets": [
            { "expr": "workspace_success_on_first_tool_rate" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "steps": [
                { "color": "red", "value": 0 },
                { "color": "yellow", "value": 0.6 },
                { "color": "green", "value": 0.85 }
              ]}
            }
          }
        },
        {
          "title": "Policy Denial After Recommendation",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 16 },
          "targets": [
            { "expr": "workspace_policy_denial_rate_bad_recommendation" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "steps": [
                { "color": "green", "value": 0 },
                { "color": "yellow", "value": 0.1 },
                { "color": "red", "value": 0.3 }
              ]}
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["underpass", "runtime", "workspace"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Underpass Runtime",
      "uid": "underpass-runtime"
    }
{{- end }}
