sonar.projectKey=underpass-ai_underpass-runtime
sonar.organization=underpass-ai-swe-ai-fleet

sonar.sources=.
sonar.exclusions=**/*_test.go,**/testdata/**,**/vendor/**,e2e/**,services/**,api/**,.github/**,scripts/**,gen/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go,e2e/**/*.py

sonar.coverage.exclusions=gen/**
sonar.go.coverage.reportPaths=coverage-full.out

sonar.coverage.minimum=70
sonar.newCode.coverage.minimum=80

# Block merge until SonarCloud quality gate passes.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Go test naming convention: TestFoo_SubScenario uses underscores idiomatically.
# S100 flags these as naming violations — suppress in test files only.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
