version: 2
updates:
  # Go modules — root workspace
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    groups:
      aws:
        patterns:
          - "github.com/aws/*"
        update-types: ["minor", "patch"]
      k8s:
        patterns:
          - "k8s.io/*"
        update-types: ["minor", "patch"]
      otel:
        patterns:
          - "go.opentelemetry.io/*"
        update-types: ["minor", "patch"]
      go-deps:
        patterns:
          - "*"
        update-types: ["minor", "patch"]

  # Go modules — tool-learning service
  - package-ecosystem: gomod
    directory: /services/tool-learning
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
      - tool-learning
    groups:
      tool-learning-go:
        patterns:
          - "*"
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        patterns:
          - "*"
        update-types: ["minor", "patch"]

  # Docker — root Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    groups:
      docker-root:
        patterns:
          - "*"
        update-types: ["minor", "patch"]

  # Docker — runner images
  - package-ecosystem: docker
    directory: /runner-images
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
      - runner-images
    groups:
      runner-images:
        patterns:
          - "*"
        update-types: ["minor", "patch"]

  # Docker — tool-learning
  - package-ecosystem: docker
    directory: /services/tool-learning
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
      - tool-learning
    groups:
      tool-learning-docker:
        patterns:
          - "*"
        update-types: ["minor", "patch"]
