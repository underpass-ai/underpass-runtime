name: CI — Workspace

on:
  push:
    branches: [main]
    paths-ignore:
      - "services/**"
      - ".github/workflows/ci-tool-learning.yml"
  pull_request:
    paths-ignore:
      - "services/**"
      - ".github/workflows/ci-tool-learning.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.11"

jobs:
  # ──────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint (no k8s)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
          only-new-issues: true

      - name: golangci-lint (k8s)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m --build-tags=k8s
          only-new-issues: true

      - name: go vet (no k8s)
        run: go vet ./...

      - name: go vet (k8s)
        run: go vet -tags k8s ./...

      - name: Validate OpenAPI spec
        run: |
          npx --yes @redocly/cli lint api/openapi/workspace.v1.yaml \
            --skip-rule no-unused-components \
            --skip-rule operation-4xx-response \
            --skip-rule no-server-example.com \
            --skip-rule security-defined

      - name: Helm lint
        run: |
          if command -v helm &>/dev/null; then
            helm lint charts/underpass-runtime
          else
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
            helm lint charts/underpass-runtime
          fi

  # ──────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - tags: ""
            label: "docker-local"
          - tags: "k8s"
            label: "k8s"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build (${{ matrix.label }})
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            CGO_ENABLED=0 go build -tags "${{ matrix.tags }}" -o bin/underpass-runtime ./cmd/workspace
          else
            CGO_ENABLED=0 go build -o bin/underpass-runtime ./cmd/workspace
          fi

      - name: Upload binary
        if: matrix.tags == ''
        uses: actions/upload-artifact@v7
        with:
          name: underpass-runtime-linux-amd64
          path: bin/underpass-runtime
          retention-days: 5

  # ──────────────────────────────────────────────
  # Test — Docker-local (default, no k8s tag)
  # ──────────────────────────────────────────────
  test:
    name: Test (docker-local)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Coverage — core gate (80%)
        run: |
          CORE_PKGS="./internal/app ./internal/adapters/audit ./internal/adapters/policy ./internal/adapters/sessionstore ./internal/adapters/invocationstore"
          go test $CORE_PKGS -coverprofile=coverage-core.out -covermode=atomic
          COVERAGE=$(go tool cover -func=coverage-core.out | awk '/^total:/ {print $3}' | sed 's/%//')
          echo "Core coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !(${COVERAGE} >= 80)}"; then
            echo "Coverage gate PASSED: ${COVERAGE}% >= 80%"
          else
            echo "::error::Coverage gate FAILED: ${COVERAGE}% < 80%"
            exit 1
          fi

      - name: Coverage — full report
        run: go test ./... -coverprofile=coverage-full.out -covermode=atomic
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-docker-local
          path: |
            coverage-core.out
            coverage-full.out
          retention-days: 5

  # ──────────────────────────────────────────────
  # Test — K8s (with build tag)
  # ──────────────────────────────────────────────
  test-k8s:
    name: Test (k8s)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests (k8s)
        run: go test -race -count=1 -tags k8s ./...

      - name: Coverage — full report (k8s)
        run: go test -tags k8s ./... -coverprofile=coverage-k8s.out -covermode=atomic
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-k8s
          path: coverage-k8s.out
          retention-days: 5

  # ──────────────────────────────────────────────
  # Security — govulncheck
  # ──────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true

  # ──────────────────────────────────────────────
  # CodeQL — static analysis for security
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          config: |
            paths-ignore:
              - services
              - e2e
            model-packs:
              - .github/codeql/extensions/underpass-sanitizers.yml

      - name: Build
        run: CGO_ENABLED=0 go build -tags k8s ./...

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: workspace

  # ──────────────────────────────────────────────
  # Docker — image build
  # ──────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: |
            underpass-runtime:${{ github.sha }}
            underpass-runtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # SonarCloud (when configured)
  # ──────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    needs: [test, test-k8s]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage (docker-local)
        uses: actions/download-artifact@v4
        with:
          name: coverage-docker-local
          path: .

      - name: Download coverage (k8s)
        uses: actions/download-artifact@v4
        with:
          name: coverage-k8s
          path: .

      - name: Merge coverage profiles
        run: |
          if [ -f coverage-full.out ] && [ -f coverage-k8s.out ]; then
            head -1 coverage-full.out > coverage-merged.out
            tail -n +2 coverage-full.out >> coverage-merged.out
            tail -n +2 coverage-k8s.out >> coverage-merged.out
            mv coverage-merged.out coverage-full.out
            echo "Merged docker-local + k8s coverage profiles"
          else
            echo "Using available coverage profile(s)"
          fi

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838 # v3.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=underpass-ai-swe-ai-fleet
            -Dsonar.projectKey=underpass-ai_underpass-runtime
            -Dsonar.go.coverage.reportPaths=coverage-full.out
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go,**/testdata/**,**/vendor/**,e2e/**,services/**,api/**,.github/**,scripts/**
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go,e2e/**/*.py
            -Dsonar.coverage.minimum=70
            -Dsonar.newCode.coverage.minimum=80
