name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.11"

jobs:
  # ──────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint (no k8s)
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
          only-new-issues: true

      - name: golangci-lint (k8s)
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m --build-tags=k8s
          only-new-issues: true

      - name: go vet (no k8s)
        run: go vet ./...

      - name: go vet (k8s)
        run: go vet -tags k8s ./...

  # ──────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - tags: ""
            label: "docker-local"
          - tags: "k8s"
            label: "k8s"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build (${{ matrix.label }})
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            CGO_ENABLED=0 go build -tags "${{ matrix.tags }}" -o bin/underpass-runtime ./cmd/workspace
          else
            CGO_ENABLED=0 go build -o bin/underpass-runtime ./cmd/workspace
          fi

      - name: Upload binary
        if: matrix.tags == ''
        uses: actions/upload-artifact@v4
        with:
          name: underpass-runtime-linux-amd64
          path: bin/underpass-runtime
          retention-days: 5

  # ──────────────────────────────────────────────
  # Test — Docker-local (default, no k8s tag)
  # ──────────────────────────────────────────────
  test:
    name: Test (docker-local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Coverage — core gate (80%)
        run: |
          CORE_PKGS="./internal/app ./internal/adapters/audit ./internal/adapters/policy ./internal/adapters/sessionstore ./internal/adapters/invocationstore"
          go test $CORE_PKGS -coverprofile=coverage-core.out -covermode=atomic
          COVERAGE=$(go tool cover -func=coverage-core.out | awk '/^total:/ {print $3}' | sed 's/%//')
          echo "Core coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !(${COVERAGE} >= 80)}"; then
            echo "Coverage gate PASSED: ${COVERAGE}% >= 80%"
          else
            echo "::error::Coverage gate FAILED: ${COVERAGE}% < 80%"
            exit 1
          fi

      - name: Coverage — full report
        run: go test ./... -coverprofile=coverage-full.out -covermode=atomic
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-docker-local
          path: |
            coverage-core.out
            coverage-full.out
          retention-days: 5

  # ──────────────────────────────────────────────
  # Test — K8s (with build tag)
  # ──────────────────────────────────────────────
  test-k8s:
    name: Test (k8s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests (k8s)
        run: go test -race -count=1 -tags k8s ./...

      - name: Coverage — full report (k8s)
        run: go test -tags k8s ./... -coverprofile=coverage-k8s.out -covermode=atomic
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-k8s
          path: coverage-k8s.out
          retention-days: 5

  # ──────────────────────────────────────────────
  # Security — govulncheck
  # ──────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Docker — image build
  # ──────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            underpass-runtime:${{ github.sha }}
            underpass-runtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # SonarCloud (when configured)
  # ──────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test, test-k8s]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage (docker-local)
        uses: actions/download-artifact@v4
        with:
          name: coverage-docker-local
          path: .

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarcloud-github-action@v3.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=underpass-ai-swe-ai-fleet
            -Dsonar.projectKey=underpass-ai_underpass-runtime
            -Dsonar.go.coverage.reportPaths=coverage-full.out
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go,**/testdata/**,**/vendor/**
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.coverage.minimum=70
            -Dsonar.newCode.coverage.minimum=80
