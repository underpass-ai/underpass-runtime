name: CI — Tool Learning

on:
  push:
    branches: [main]
    paths:
      - "services/tool-learning/**"
      - ".github/workflows/ci-tool-learning.yml"
  pull_request:
    paths:
      - "services/tool-learning/**"
      - ".github/workflows/ci-tool-learning.yml"

concurrency:
  group: ci-tool-learning-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: services/tool-learning

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.11"

jobs:
  # ──────────────────────────────────────────────
  # Decoupling guard — reject workspace imports
  # ──────────────────────────────────────────────
  decoupling-guard:
    name: Decoupling Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Reject workspace module imports
        run: |
          if grep -q 'github.com/underpass-ai/underpass-runtime' services/tool-learning/go.mod 2>/dev/null; then
            # go.mod declares the module path itself — that's OK.
            # But any require of the root module is forbidden.
            if grep -E '^\s*require\s' services/tool-learning/go.mod | grep -q 'github.com/underpass-ai/underpass-runtime[^/]'; then
              echo "::error::tool-learning go.mod imports the workspace module. This violates the decoupling contract."
              exit 1
            fi
          fi
          # Check source files for direct imports of the workspace module
          if grep -rn '"github.com/underpass-ai/underpass-runtime/' services/tool-learning/ --include='*.go' | grep -v 'services/tool-learning/'; then
            echo "::error::Go source files import the workspace module. This violates the decoupling contract."
            exit 1
          fi
          echo "Decoupling guard passed — no workspace module imports found."
        working-directory: .

  # ──────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: services/tool-learning
          args: --timeout=5m
          only-new-issues: true

      - name: go vet
        run: go vet ./...

  # ──────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build -o bin/tool-learning ./cmd/tool-learning

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: tool-learning-linux-amd64
          path: services/tool-learning/bin/tool-learning
          retention-days: 5

  # ──────────────────────────────────────────────
  # Test
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -race -count=1 -v ./...

      - name: Coverage gate (80% — domain + app + adapters)
        run: |
          CORE_PKGS="./internal/domain ./internal/app ./internal/adapters/..."
          go test $CORE_PKGS -coverprofile=coverage-core.out -covermode=atomic
          COVERAGE=$(go tool cover -func=coverage-core.out | awk '/^total:/ {print $3}' | sed 's/%//')
          echo "Core coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !(${COVERAGE} >= 80)}"; then
            echo "Coverage gate PASSED: ${COVERAGE}% >= 80%"
          else
            echo "::error::Coverage gate FAILED: ${COVERAGE}% < 80%"
            exit 1
          fi

      - name: Full coverage (for SonarCloud)
        run: go test ./... -coverprofile=coverage-full.out -covermode=atomic

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-tool-learning
          path: services/tool-learning/coverage-full.out
          retention-days: 5

  # ──────────────────────────────────────────────
  # Security — govulncheck
  # ──────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Non-blocking until Go 1.25.8 lands in CI (GO-2026-4601, GO-2026-4602)
        # and go-duckdb updates mapstructure (GO-2025-3787).
        run: govulncheck ./...
        continue-on-error: true

  # ──────────────────────────────────────────────
  # CodeQL — static analysis for security
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          config: |
            paths:
              - services/tool-learning

      - name: Build
        run: go build ./...

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: tool-learning

  # ──────────────────────────────────────────────
  # SonarCloud
  # ──────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-tool-learning
          path: services/tool-learning

      - name: SonarCloud scan
        uses: sonarsource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: services/tool-learning

  # ──────────────────────────────────────────────
  # Docker — build, push on main
  # ──────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [lint, test, build, decoupling-guard]
    env:
      REGISTRY: ghcr.io/underpass-ai/underpass-runtime
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Read chart version
        run: |
          VER=$(grep '^appVersion:' charts/underpass-runtime/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "VERSION=${VER}" >> "$GITHUB_ENV"
        working-directory: .

      - name: Login to GHCR (dedicated token)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.GHCR_USERNAME != '' && env.GHCR_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Login to GHCR (GITHUB_TOKEN fallback)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (env.GHCR_USERNAME == '' || env.GHCR_TOKEN == '')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push — tool-learning
        uses: docker/build-push-action@v7
        with:
          context: services/tool-learning
          file: services/tool-learning/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/tool-learning:${{ env.VERSION }}
            ${{ env.REGISTRY }}/tool-learning:latest
          cache-from: type=gha,scope=tool-learning
          cache-to: type=gha,scope=tool-learning,mode=max
