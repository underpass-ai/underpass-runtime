version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - misspell
    - gofmt
    - bodyclose
    - exportloopref
    - nilerr
    - prealloc

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - commentFormatting
      - hugeParam

  misspell:
    locale: US

  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - vendor
    - testdata

formatters:
  enable:
    - gofmt
