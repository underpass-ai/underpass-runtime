version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - bodyclose
    - nilerr
    - prealloc
  exclusions:
    paths:
      - vendor
      - testdata
    rules:
      - linters:
          - gocritic
          - errcheck
        path: _test\.go
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - commentFormatting
        - hugeParam
    misspell:
      locale: US
    govet:
      enable-all: true
      disable:
        - fieldalignment

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

formatters:
  enable:
    - gofmt
