# E2E test registry. The suite is a single data-driven per-tool matrix: one
# runner loads the tool catalog and exercises governance + happy-path cases for
# every registered tool. See e2e/README.md.
workspace_tests:
  - id: "00"
    name: "00-tool-matrix"
    job_name: "e2e-tool-matrix"
    tier: "core"
    kind: "workspace"
    timeout_override: 1800
    tags: ["workspace", "tools", "governance", "per-tool", "matrix", "catalog"]
