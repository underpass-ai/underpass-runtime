providers:
  claude:
    type: anthropic
    model: claude-sonnet-4-20250514
    url: https://api.anthropic.com/v1/messages
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 4096
    temperature: 0.2
    tool_calling: true

  openai:
    type: openai
    model: gpt-4o-mini
    url: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    max_tokens: 4096
    temperature: 0.2
    tool_calling: true

  vllm:
    type: vllm
    model: Qwen/Qwen3-8B
    url: http://vllm-server.underpass-runtime.svc.cluster.local:8000
    max_tokens: 4096
    temperature: 0.2
    tool_calling: false
    thinking:
      enabled: false

  vllm-qwen35:
    type: vllm
    model: Qwen/Qwen3.5-9B
    url: http://vllm-qwen35.underpass-runtime.svc.cluster.local:8000
    max_tokens: 2048
    temperature: 0.6
    tool_calling: true
    thinking:
      enabled: true
      strip_tags: true
