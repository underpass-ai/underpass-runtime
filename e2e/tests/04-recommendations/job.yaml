apiVersion: batch/v1
kind: Job
metadata:
  name: e2e-recommendations
  namespace: underpass-runtime
  labels:
    app: e2e-recommendations
    test-type: e2e
    test-suite: workspace
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 600

  template:
    metadata:
      labels:
        app: e2e-recommendations
        test-type: e2e
        test-suite: workspace
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull

      containers:
        - name: test-runner
          image: ghcr.io/underpass-ai/underpass-runtime/e2e-recommendations:v1.0.0
          imagePullPolicy: Always
          env:
            - name: WORKSPACE_URL
              value: "https://underpass-runtime.underpass-runtime.svc.cluster.local:50053"
            - name: WORKSPACE_TLS_CA_PATH
              value: "/var/run/e2e-client-tls/ca.crt"
            - name: WORKSPACE_TLS_CERT_PATH
              value: "/var/run/e2e-client-tls/tls.crt"
            - name: WORKSPACE_TLS_KEY_PATH
              value: "/var/run/e2e-client-tls/tls.key"
            - name: WORKSPACE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workspace-auth
                  key: shared_token
                  optional: true
            - name: WORKSPACE_AUTH_TENANT_ID
              value: "e2e-tenant"
            - name: WORKSPACE_AUTH_ACTOR_ID
              value: "e2e-actor"
            - name: WORKSPACE_AUTH_ROLES
              value: "developer"
            - name: EVIDENCE_FILE
              value: "/tmp/evidence-04.json"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: E2E_DEBUG
              value: "0"
            - name: E2E_SKIP_CLEANUP
              value: "0"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: e2e-client-tls
              mountPath: /var/run/e2e-client-tls
              readOnly: true

      volumes:
        - name: e2e-client-tls
          secret:
            secretName: e2e-client-tls
      dnsPolicy: ClusterFirst
