  - name: notify.escalation_channel
    description: Deliver a structured incident handoff to the configured escalation channel for the current environment.
    input_schema: '{"type":"object","properties":{"incident_id":{"type":"string","maxLength":200},"handoff_node_id":{"type":"string","maxLength":200},"summary":{"type":"string","maxLength":200},"upstream_specialist":{"type":"string","maxLength":100},"upstream_decision":{"type":"string","maxLength":100},"reason":{"type":"string","maxLength":1000},"resource_ref":{"type":"string","maxLength":200}},"required":["incident_id","handoff_node_id","summary","upstream_specialist","upstream_decision","reason"],"additionalProperties":false}'
