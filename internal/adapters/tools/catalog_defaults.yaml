    idempotency: guaranteed
    constraints:
      timeout_seconds: 20
      max_retries: 1
      output_limit_kb: 256
    preconditions:
      - workspace must contain a git repository
    postconditions:
      - no repository mutation
    cost_hint: low
    examples:
      - '{"short":true}'

  - name: git.diff
    description: Return unified diff from git workspace.
    input_schema: '{"type":"object","properties":{"staged":{"type":"boolean"},"paths":{"type":"array","items":{"type":"string"}},"base":{"type":"string"}},"required":[]}'
    output_schema: '{"type":"object","properties":{"diff":{"type":"string"}}}'
    scope: repo
    side_effects: none
