    input_schema: '{"type":"object","properties":{"ref":{"type":"string"},"max_count":{"type":"integer","minimum":1,"maximum":200}},"required":[]}'
    output_schema: '{"type":"object","properties":{"ref":{"type":"string"},"count":{"type":"integer"},"entries":{"type":"array","items":{"type":"object","properties":{"hash":{"type":"string"},"author_name":{"type":"string"},"author_email":{"type":"string"},"date":{"type":"string"},"subject":{"type":"string"},"parents":{"type":"array","items":{"type":"string"}}}}}}}'
