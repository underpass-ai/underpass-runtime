    cost_hint: low
    policy:
      arg_fields:
        - field: ref
          max_length: 256
          deny_characters:
            - ;
            - "|"
            - "&"
            - "`"
            - $(
            - ">"
            - <
            - "\n"
            - "\r"
    examples:
