  - name: github.create_pr
    description: Create a pull request on GitHub via gh CLI.
    input_schema: '{"type":"object","properties":{"title":{"type":"string"},"body":{"type":"string"},"base":{"type":"string"},"head":{"type":"string"}},"required":["title","head"]}'
    output_schema: '{"type":"object","properties":{"pr_url":{"type":"string"},"base":{"type":"string"},"head":{"type":"string"}}}'
    scope: external
    side_effects: irreversible
    risk_level: medium
    requires_approval: true

  - name: github.check_pr_status
    description: Poll CI check status on a pull request branch.
    input_schema: '{"type":"object","properties":{"branch":{"type":"string"},"timeout_seconds":{"type":"integer"},"required_checks":{"type":"array","items":{"type":"string"}}},"required":["branch"]}'
    output_schema: '{"type":"object","properties":{"status":{"type":"string"},"checks":{"type":"array"}}}'
