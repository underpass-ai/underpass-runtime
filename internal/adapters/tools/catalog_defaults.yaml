# Tool catalog — source of truth for workspace capabilities.
# Generated from DefaultCapabilities(), then maintained as YAML.
# Loaded at startup via go:embed.

_anchors:
  shell_deny_chars: &shell_deny
    - ;
    - "|"
    - "&"
    - "`"
    - $(
    - ">"
    - <
    - "\n"
    - "\r"
  shell_deny_chars_space: &shell_deny_space
    - ;
    - "|"
    - "&"
    - "`"
    - $(
    - ">"
    - <
    - "\n"
    - "\r"
    - " "
  test_allowed_prefix: &test_allowed
    - "-v"
    - "-q"
    - "-race"
    - "-cover"
    - "-coverprofile="
    - "-run="
    - "-count="
    - "-timeout="
    - "--if-present"
    - "--silent"
    - "--maxfail="
    - "--disable-warnings"
    - "--release"
    - "--locked"
    - "--offline"
    - "--features="
    - "--all-features"
    - "--no-default-features"
    - "--package="
    - "--tests"
    - "-P"
    - "--no-daemon"
    - "-D"
  test_denied_prefix: &test_denied
    - "-exec"
    - "-toolexec"
    - "-mod=mod"
    - "-modfile"
    - "-buildmode=plugin"
    - "-f"
    - "--file"
    - "--require"
    - "--import"
    - "--project-cache-dir"
  build_allowed_prefix: &build_allowed
    - "-v"
    - "-q"
    - "-race"
    - "-trimpath"
    - "-tags="
    - "-cover"
    - "-coverprofile="
    - "-run="
    - "-count="
    - "-timeout="
    - "--if-present"
    - "--silent"
    - "--maxfail="
    - "--disable-warnings"
    - "--release"
    - "--locked"
    - "--offline"
    - "--features="
    - "--all-features"
    - "--no-default-features"
    - "--package="
    - "--tests"
    - "-P"
    - "--no-daemon"
    - "-D"
  lang_tool_output: &lang_tool_output '{"type":"object","properties":{"exit_code":{"type":"integer"},"compiled_binary_path":{"type":"string"},"coverage_percent":{"type":"number"},"diagnostics":{"type":"array","items":{"type":"string"}}}}'

  policy_extra_args_test: &policy_extra_args_test
    arg_fields:
      - field: extra_args
        multi: true
        max_items: 8
        max_length: 64
        allowed_prefix: *test_allowed
        denied_prefix: *test_denied
        deny_characters: *shell_deny

  policy_extra_args_build: &policy_extra_args_build
    arg_fields:
      - field: extra_args
        multi: true
        max_items: 8
        max_length: 64
        allowed_prefix: *build_allowed
        denied_prefix: *test_denied
        deny_characters: *shell_deny

  policy_git_remote: &policy_git_remote
    arg_fields:
      - field: remote
        max_length: 128
        deny_characters: *shell_deny_space
      - field: refspec
        max_length: 512
        deny_characters: *shell_deny_space

capabilities:
  - name: fs.list
    description: List files/directories under the session workspace.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"recursive":{"type":"boolean"},"max_entries":{"type":"integer","minimum":1,"maximum":1000}},"required":[]}'
    output_schema: '{"type":"object","properties":{"entries":{"type":"array"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 15
      output_limit_kb: 256
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":".","recursive":false}'

  - name: fs.read_file
    description: Read a text or binary file from workspace.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"max_bytes":{"type":"integer","minimum":1,"maximum":1048576}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"content":{"type":"string"},"encoding":{"type":"string"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 20
      output_limit_kb: 1024
    preconditions:
      - path must be inside allowed_paths and point to a regular file
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"README.md"}'

  - name: fs.write_file
    description: Write a file in workspace using UTF-8 or base64 payload.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"content":{"type":"string"},"encoding":{"type":"string","enum":["utf8","base64"]},"create_parents":{"type":"boolean"}},"required":["path","content"]}'
    output_schema: '{"type":"object","properties":{"bytes_written":{"type":"integer"},"sha256":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 256
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - target file updated
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"notes/todo.txt","content":"hello","create_parents":true}'

  - name: fs.mkdir
    description: Create a directory inside workspace.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"create_parents":{"type":"boolean"},"mode":{"type":"string"},"exist_ok":{"type":"boolean"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"created":{"type":"boolean"},"mode":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 64
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - directory may be created
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"tmp/output","create_parents":true,"mode":"0755","exist_ok":true}'

  - name: fs.move
    description: Move or rename a file/directory inside workspace.
    input_schema: '{"type":"object","properties":{"source_path":{"type":"string"},"destination_path":{"type":"string"},"overwrite":{"type":"boolean"},"create_parents":{"type":"boolean"}},"required":["source_path","destination_path"]}'
    output_schema: '{"type":"object","properties":{"source_path":{"type":"string"},"destination_path":{"type":"string"},"moved":{"type":"boolean"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 64
    preconditions:
      - source and destination must be inside allowed_paths
    postconditions:
      - source path may be relocated
    cost_hint: low
    policy:
      path_fields:
        - field: source_path
          workspace_relative: true
        - field: destination_path
          workspace_relative: true
    examples:
      - '{"source_path":"tmp/file.txt","destination_path":"tmp/archive/file.txt","overwrite":true,"create_parents":true}'

  - name: fs.copy
    description: Copy a file/directory inside workspace.
    input_schema: '{"type":"object","properties":{"source_path":{"type":"string"},"destination_path":{"type":"string"},"recursive":{"type":"boolean"},"overwrite":{"type":"boolean"},"create_parents":{"type":"boolean"}},"required":["source_path","destination_path"]}'
    output_schema: '{"type":"object","properties":{"source_path":{"type":"string"},"destination_path":{"type":"string"},"copied":{"type":"boolean"},"type":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 25
      output_limit_kb: 64
    preconditions:
      - source and destination must be inside allowed_paths
    postconditions:
      - destination path may be created/updated
    cost_hint: low
    policy:
      path_fields:
        - field: source_path
          workspace_relative: true
        - field: destination_path
          workspace_relative: true
    examples:
      - '{"source_path":"notes/todo.txt","destination_path":"notes/todo.copy.txt","overwrite":true}'

  - name: fs.delete
    description: Delete a file/directory inside workspace.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"recursive":{"type":"boolean"},"force":{"type":"boolean"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"deleted":{"type":"boolean"},"existed":{"type":"boolean"}}}'
    scope: workspace
    side_effects: irreversible
    risk_level: high
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 64
    preconditions:
      - path must be inside allowed_paths and must not be workspace root
    postconditions:
      - target path may be removed
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"tmp/old.log","recursive":false,"force":true}'

  - name: fs.stat
    description: "Get metadata (type, size, mode, mtime) for a workspace path."
    input_schema: '{"type":"object","properties":{"path":{"type":"string"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"exists":{"type":"boolean"},"type":{"type":"string"},"size_bytes":{"type":"integer"},"mode":{"type":"string"},"modified_at":{"type":"string"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 15
      output_limit_kb: 64
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"README.md"}'

  - name: fs.edit
    description: Surgical search-and-replace edit on a single file. Finds old_string and replaces with new_string. Fails if old_string is not found or is ambiguous (multiple matches without replace_all).
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path to the file within the workspace"},"old_string":{"type":"string","description":"Exact text to find in the file"},"new_string":{"type":"string","description":"Replacement text (use empty string to delete)"},"replace_all":{"type":"boolean","description":"Replace all occurrences. When false (default), old_string must be unique in the file"}},"required":["path","old_string","new_string"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"replacements":{"type":"integer"},"sha256":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 30
      output_limit_kb: 64
    preconditions:
      - path must exist and be inside allowed_paths
      - old_string must be found in the file
    postconditions:
      - file contents change in place
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"src/main.go","old_string":"fmt.Println(\"hello\")","new_string":"fmt.Println(\"world\")","replace_all":false}'

  - name: fs.patch
    description: Apply a unified diff patch to files in the workspace.
    input_schema: '{"type":"object","properties":{"unified_diff":{"type":"string"},"strategy":{"type":"string","enum":["apply","reject_on_conflict"]}},"required":["unified_diff"]}'
    output_schema: '{"type":"object","properties":{"applied":{"type":"boolean"},"strategy":{"type":"string"},"changed_paths":{"type":"array","items":{"type":"string"}},"output":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 45
      output_limit_kb: 1024
    preconditions:
      - patch paths must be inside allowed_paths
    postconditions:
      - workspace files may change
    cost_hint: medium
    examples:
      - '{"unified_diff":"diff --git a/file b/file\n...","strategy":"reject_on_conflict"}'

  - name: fs.search
    description: Search file contents using regex pattern.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"pattern":{"type":"string"},"max_results":{"type":"integer","minimum":1,"maximum":2000}},"required":["pattern"]}'
    output_schema: '{"type":"object","properties":{"matches":{"type":"array"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 30
      output_limit_kb: 512
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: medium
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":".","pattern":"TODO","max_results":50}'

  - name: fs.read_lines
    description: Read a specific range of lines from a file with line numbers. Essential for navigating large files without loading them entirely. Returns numbered lines and total line count.
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path to the file"},"start_line":{"type":"integer","minimum":1,"description":"First line to read (1-based, default 1)"},"end_line":{"type":"integer","minimum":1,"description":"Last line to read (default 100, max range 500 lines)"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"start_line":{"type":"integer"},"end_line":{"type":"integer"},"total_lines":{"type":"integer"},"content":{"type":"string"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 15
      output_limit_kb: 256
    preconditions:
      - path must exist and be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"src/main.go","start_line":1,"end_line":50}'
      - '{"path":"internal/app/service.go","start_line":100,"end_line":150}'

  - name: fs.insert
    description: Insert text at a specific line number without replacing existing content. Line 0 prepends before line 1. Complements fs.edit for adding new code (imports, functions, etc.) at precise positions. Supports undo via workspace.undo_edit.
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path to the file"},"line":{"type":"integer","minimum":0,"description":"Line number to insert after (0 = prepend before first line)"},"content":{"type":"string","description":"Text to insert (newline appended if missing)"}},"required":["path","line","content"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"inserted_at":{"type":"integer"},"total_lines":{"type":"integer"},"sha256":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 15
      output_limit_kb: 64
    preconditions:
      - path must exist and be inside allowed_paths
    postconditions:
      - file contents change in place
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"src/main.go","line":5,"content":"import \"fmt\""}'
      - '{"path":"src/handler.go","line":0,"content":"package handlers\n"}'

  - name: workspace.undo_edit
    description: Revert the last edit to a specific file. Restores the file to its state before the most recent fs.edit, fs.write_file, or fs.insert operation. Single-level undo — only the last mutation can be reverted.
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path to the file to undo"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"restored":{"type":"boolean"},"sha256":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 15
      output_limit_kb: 64
    preconditions:
      - an undo snapshot must exist for the file
    postconditions:
      - file reverted to previous state
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"src/main.go"}'

  - name: repo.tree
    description: Show the directory tree structure of the workspace. Provides instant codebase orientation with configurable depth and ignore patterns. Directories sorted first, common noise directories (.git, node_modules, etc.) excluded by default.
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Subdirectory to tree (default: workspace root)"},"max_depth":{"type":"integer","minimum":1,"maximum":10,"description":"Maximum directory depth (default: 3)"},"show_files":{"type":"boolean","description":"Show files in addition to directories (default: true)"},"ignore":{"type":"string","description":"Comma-separated directory names to ignore (default: .git,node_modules,.venv,__pycache__,vendor,...)"}},"required":[]}'
    output_schema: '{"type":"object","properties":{"tree":{"type":"string"},"entries":{"type":"integer"},"truncated":{"type":"boolean"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 15
      output_limit_kb: 256
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"max_depth":2}'
      - '{"path":"internal","max_depth":4,"show_files":false}'

  - name: fs.glob
    description: Find files by glob pattern within the workspace. Supports doublestar patterns (e.g. **/*.go, src/**/*.ts). Returns file paths only, no content. Use this to orient in a codebase before reading or editing files.
    input_schema: '{"type":"object","properties":{"pattern":{"type":"string","description":"Glob pattern with doublestar support (e.g. **/*.go, src/**/test_*.py)"},"path":{"type":"string","description":"Subdirectory to search in (default: workspace root)"},"max_files":{"type":"integer","minimum":1,"maximum":5000,"description":"Maximum files to return (default: 1000)"}},"required":["pattern"]}'
    output_schema: '{"type":"object","properties":{"matches":{"type":"array","items":{"type":"string"}},"count":{"type":"integer"},"truncated":{"type":"boolean"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 30
      output_limit_kb: 512
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"pattern":"**/*.go"}'
      - '{"pattern":"**/Dockerfile","path":"services"}'

  - name: shell.exec
    description: Execute a shell command in the workspace. Runs via sh -lc in the session workspace directory. Use for any operation not covered by specialized tools (make, pip, cargo, curl, etc.). Output is captured and returned.
    input_schema: '{"type":"object","properties":{"command":{"type":"string","description":"Shell command to execute (max 4096 chars)"},"stdin":{"type":"string","description":"Optional stdin to pipe to the command"},"timeout_seconds":{"type":"integer","minimum":1,"maximum":600,"description":"Command timeout (default: 60s, max: 600s)"},"cwd":{"type":"string","description":"Working directory relative to workspace (default: workspace root)"}},"required":["command"]}'
    output_schema: '{"type":"object","properties":{"command":{"type":"string"},"exit_code":{"type":"integer"},"stdout":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: high
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 600
      output_limit_kb: 1024
    preconditions:
      - command must not exceed 4096 characters
    postconditions:
      - workspace state may change depending on the command
    cost_hint: medium
    policy:
      arg_fields:
        - field: command
          max_length: 4096
      path_fields:
        - field: cwd
          workspace_relative: true
    examples:
      - '{"command":"make test"}'
      - '{"command":"pip install -r requirements.txt","timeout_seconds":120}'
      - '{"command":"cargo check","cwd":"services/rust-svc"}'

  - name: tool.suggest
    description: Recommend tools for a task described in natural language. Returns ranked suggestions with scores, explanations, and risk levels. Agents use this to discover the right tool instead of guessing. Optional filters by scope (workspace/repo) or family (fs/git/shell/etc.).
    input_schema: '{"type":"object","properties":{"task":{"type":"string","description":"Natural language description of what you want to do"},"top_k":{"type":"integer","minimum":1,"maximum":20,"description":"Max suggestions to return (default 5)"},"scope":{"type":"string","description":"Filter by scope (workspace, repo, etc.)"},"family":{"type":"string","description":"Filter by tool family prefix (fs, git, shell, etc.)"}},"required":["task"]}'
    output_schema: '{"type":"object","properties":{"task":{"type":"string"},"suggestions":{"type":"array"},"count":{"type":"integer"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 5
      output_limit_kb: 64
    preconditions: []
    postconditions:
      - no side effects
    cost_hint: low
    examples:
      - '{"task":"edit a specific function in a Go file"}'
      - '{"task":"find all test files in the project","family":"fs"}'
      - '{"task":"run the test suite and check for failures"}'

  - name: policy.check
    description: Validate whether a tool invocation would be allowed by the policy engine WITHOUT executing it. Returns allowed/denied with specific violation details. Use this to pre-validate actions before attempting them, avoiding wasted tool calls and policy denials.
    input_schema: '{"type":"object","properties":{"tool_name":{"type":"string","description":"Name of the tool to check (e.g. shell.exec, fs.edit)"},"args":{"type":"object","description":"The arguments you would pass to the tool"}},"required":["tool_name"]}'
    output_schema: '{"type":"object","properties":{"tool_name":{"type":"string"},"allowed":{"type":"boolean"},"reason":{"type":"string"},"requires_approval":{"type":"boolean"},"risk_level":{"type":"string"},"violations":{"type":"array","items":{"type":"string"}}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 5
      output_limit_kb: 16
    preconditions: []
    postconditions:
      - no side effects, no execution
    cost_hint: low
    examples:
      - '{"tool_name":"shell.exec","args":{"command":"make test"}}'
      - '{"tool_name":"fs.edit","args":{"path":"../../../etc/passwd","old_string":"root","new_string":"hacked"}}'

  - name: web.fetch
    description: Fetch content from a URL and return it as text. Enables agents to read API documentation, library changelogs, error messages on Stack Overflow, and package registry pages. Auto-upgrades HTTP to HTTPS.
    input_schema: '{"type":"object","properties":{"url":{"type":"string","description":"URL to fetch (auto-prepends https:// if missing)"},"timeout_seconds":{"type":"integer","minimum":1,"maximum":120,"description":"Request timeout (default 30s)"}},"required":["url"]}'
    output_schema: '{"type":"object","properties":{"url":{"type":"string"},"status_code":{"type":"integer"},"content":{"type":"string"},"content_type":{"type":"string"},"truncated":{"type":"boolean"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 120
      output_limit_kb: 512
    preconditions: []
    postconditions:
      - read-only HTTP GET
    cost_hint: medium
    examples:
      - '{"url":"https://docs.python.org/3/library/json.html"}'

  - name: web.search
    description: Search the web using DuckDuckGo and return result URLs. Enables agents to find documentation, Stack Overflow answers, and library references when they encounter unknown errors or APIs.
    input_schema: '{"type":"object","properties":{"query":{"type":"string","description":"Search query"},"max_results":{"type":"integer","minimum":1,"maximum":10,"description":"Maximum results (default 5)"}},"required":["query"]}'
    output_schema: '{"type":"object","properties":{"query":{"type":"string"},"results":{"type":"array"},"count":{"type":"integer"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 30
      output_limit_kb: 64
    preconditions: []
    postconditions:
      - read-only search
    cost_hint: low
    examples:
      - '{"query":"golang context timeout best practices"}'

  - name: github.get_issue
    description: Read a GitHub issue by number including title, body, labels, assignees, and comments. Completes the issue-to-PR loop — agents can read the issue that triggered their work.
    input_schema: '{"type":"object","properties":{"number":{"type":"integer","minimum":1,"description":"Issue number"},"repo":{"type":"string","description":"Optional owner/repo (defaults to current repo)"}},"required":["number"]}'
    output_schema: '{"type":"object","properties":{"number":{"type":"integer"},"title":{"type":"string"},"body":{"type":"string"},"state":{"type":"string"},"labels":{"type":"array"},"assignees":{"type":"array"},"comments":{"type":"array"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 30
      output_limit_kb: 256
    preconditions:
      - gh CLI must be available and authenticated
    postconditions:
      - read-only
    cost_hint: low
    examples:
      - '{"number":42}'
      - '{"number":1,"repo":"org/repo"}'

  - name: repo.symbols
    description: Extract function, type, class, and import declarations from a source file WITHOUT reading the entire content. Returns a structured outline with kind, name, line number, and signature. Critical for small models that need to understand a file structure without consuming their full context window. Supports Go, Python, JavaScript, TypeScript, Rust, Java, C/C++, Ruby.
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path to the source file"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"language":{"type":"string"},"symbols":{"type":"array","items":{"type":"object","properties":{"kind":{"type":"string"},"name":{"type":"string"},"line":{"type":"integer"},"signature":{"type":"string"}}}},"count":{"type":"integer"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 15
      output_limit_kb: 128
    preconditions:
      - path must exist and be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"src/main.go"}'
      - '{"path":"internal/app/service.py"}'

  - name: git.blame
    description: Line-by-line blame for a file, showing who changed each line and when. Optional line range. Use before editing to understand code history and ownership.
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path to the file"},"start_line":{"type":"integer","minimum":1,"description":"First line (optional)"},"end_line":{"type":"integer","minimum":1,"description":"Last line (optional)"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"blame":{"type":"string"}}}'
    scope: repo
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 30
      output_limit_kb: 512
    preconditions:
      - workspace must contain a git repository
    postconditions:
      - no repository mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"src/main.go","start_line":10,"end_line":20}'

