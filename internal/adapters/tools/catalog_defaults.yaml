# Tool catalog — source of truth for workspace capabilities.
# Generated from DefaultCapabilities(), then maintained as YAML.
# Loaded at startup via go:embed.

_anchors:
  shell_deny_chars: &shell_deny
    - ;
    - "|"
    - "&"
    - "`"
    - $(
    - ">"
    - <
    - "\n"
    - "\r"
  shell_deny_chars_space: &shell_deny_space
    - ;
    - "|"
    - "&"
    - "`"
    - $(
    - ">"
    - <
    - "\n"
    - "\r"
    - " "
  test_allowed_prefix: &test_allowed
    - "-v"
    - "-q"
    - "-race"
    - "-cover"
    - "-coverprofile="
    - "-run="
    - "-count="
    - "-timeout="
    - "--if-present"
    - "--silent"
    - "--maxfail="
    - "--disable-warnings"
    - "--release"
    - "--locked"
    - "--offline"
    - "--features="
    - "--all-features"
    - "--no-default-features"
    - "--package="
    - "--tests"
    - "-P"
    - "--no-daemon"
    - "-D"
  test_denied_prefix: &test_denied
    - "-exec"
    - "-toolexec"
    - "-mod=mod"
    - "-modfile"
    - "-buildmode=plugin"
    - "-f"
    - "--file"
    - "--require"
    - "--import"
    - "--project-cache-dir"
  build_allowed_prefix: &build_allowed
    - "-v"
    - "-q"
    - "-race"
    - "-trimpath"
    - "-tags="
    - "-cover"
    - "-coverprofile="
    - "-run="
    - "-count="
    - "-timeout="
    - "--if-present"
    - "--silent"
    - "--maxfail="
    - "--disable-warnings"
    - "--release"
    - "--locked"
    - "--offline"
    - "--features="
    - "--all-features"
    - "--no-default-features"
    - "--package="
    - "--tests"
    - "-P"
    - "--no-daemon"
    - "-D"
  lang_tool_output: &lang_tool_output '{"type":"object","properties":{"exit_code":{"type":"integer"},"compiled_binary_path":{"type":"string"},"coverage_percent":{"type":"number"},"diagnostics":{"type":"array","items":{"type":"string"}}}}'

  policy_extra_args_test: &policy_extra_args_test
    arg_fields:
      - field: extra_args
        multi: true
        max_items: 8
        max_length: 64
        allowed_prefix: *test_allowed
        denied_prefix: *test_denied
        deny_characters: *shell_deny

  policy_extra_args_build: &policy_extra_args_build
    arg_fields:
      - field: extra_args
        multi: true
        max_items: 8
        max_length: 64
        allowed_prefix: *build_allowed
        denied_prefix: *test_denied
        deny_characters: *shell_deny

  policy_git_remote: &policy_git_remote
    arg_fields:
      - field: remote
        max_length: 128
        deny_characters: *shell_deny_space
      - field: refspec
        max_length: 512
        deny_characters: *shell_deny_space

capabilities:
  - name: fs.list
    description: List files/directories under the session workspace.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"recursive":{"type":"boolean"},"max_entries":{"type":"integer","minimum":1,"maximum":1000}},"required":[]}'
    output_schema: '{"type":"object","properties":{"entries":{"type":"array"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 15
      output_limit_kb: 256
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":".","recursive":false}'

  - name: fs.read_file
    description: Read a text or binary file from workspace.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"max_bytes":{"type":"integer","minimum":1,"maximum":1048576}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"content":{"type":"string"},"encoding":{"type":"string"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 20
      output_limit_kb: 1024
    preconditions:
      - path must be inside allowed_paths and point to a regular file
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"README.md"}'

  - name: fs.write_file
    description: Write a file in workspace using UTF-8 or base64 payload.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"content":{"type":"string"},"encoding":{"type":"string","enum":["utf8","base64"]},"create_parents":{"type":"boolean"}},"required":["path","content"]}'
    output_schema: '{"type":"object","properties":{"bytes_written":{"type":"integer"},"sha256":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 256
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - target file updated
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"notes/todo.txt","content":"hello","create_parents":true}'

  - name: fs.mkdir
    description: Create a directory inside workspace.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"create_parents":{"type":"boolean"},"mode":{"type":"string"},"exist_ok":{"type":"boolean"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"created":{"type":"boolean"},"mode":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 64
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - directory may be created
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"tmp/output","create_parents":true,"mode":"0755","exist_ok":true}'

  - name: fs.move
    description: Move or rename a file/directory inside workspace.
    input_schema: '{"type":"object","properties":{"source_path":{"type":"string"},"destination_path":{"type":"string"},"overwrite":{"type":"boolean"},"create_parents":{"type":"boolean"}},"required":["source_path","destination_path"]}'
    output_schema: '{"type":"object","properties":{"source_path":{"type":"string"},"destination_path":{"type":"string"},"moved":{"type":"boolean"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 64
    preconditions:
      - source and destination must be inside allowed_paths
    postconditions:
      - source path may be relocated
    cost_hint: low
    policy:
      path_fields:
        - field: source_path
          workspace_relative: true
        - field: destination_path
          workspace_relative: true
    examples:
      - '{"source_path":"tmp/file.txt","destination_path":"tmp/archive/file.txt","overwrite":true,"create_parents":true}'

  - name: fs.copy
    description: Copy a file/directory inside workspace.
    input_schema: '{"type":"object","properties":{"source_path":{"type":"string"},"destination_path":{"type":"string"},"recursive":{"type":"boolean"},"overwrite":{"type":"boolean"},"create_parents":{"type":"boolean"}},"required":["source_path","destination_path"]}'
    output_schema: '{"type":"object","properties":{"source_path":{"type":"string"},"destination_path":{"type":"string"},"copied":{"type":"boolean"},"type":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 25
      output_limit_kb: 64
    preconditions:
      - source and destination must be inside allowed_paths
    postconditions:
      - destination path may be created/updated
    cost_hint: low
    policy:
      path_fields:
        - field: source_path
          workspace_relative: true
        - field: destination_path
          workspace_relative: true
    examples:
      - '{"source_path":"notes/todo.txt","destination_path":"notes/todo.copy.txt","overwrite":true}'

  - name: fs.delete
    description: Delete a file/directory inside workspace.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"recursive":{"type":"boolean"},"force":{"type":"boolean"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"deleted":{"type":"boolean"},"existed":{"type":"boolean"}}}'
    scope: workspace
    side_effects: irreversible
    risk_level: high
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 64
    preconditions:
      - path must be inside allowed_paths and must not be workspace root
    postconditions:
      - target path may be removed
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"tmp/old.log","recursive":false,"force":true}'

  - name: fs.stat
    description: "Get metadata (type, size, mode, mtime) for a workspace path."
    input_schema: '{"type":"object","properties":{"path":{"type":"string"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"path":{"type":"string"},"exists":{"type":"boolean"},"type":{"type":"string"},"size_bytes":{"type":"integer"},"mode":{"type":"string"},"modified_at":{"type":"string"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 15
      output_limit_kb: 64
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: low
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":"README.md"}'

  - name: fs.patch
    description: Apply a unified diff patch to files in the workspace.
    input_schema: '{"type":"object","properties":{"unified_diff":{"type":"string"},"strategy":{"type":"string","enum":["apply","reject_on_conflict"]}},"required":["unified_diff"]}'
    output_schema: '{"type":"object","properties":{"applied":{"type":"boolean"},"strategy":{"type":"string"},"changed_paths":{"type":"array","items":{"type":"string"}},"output":{"type":"string"}}}'
    scope: workspace
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 45
      output_limit_kb: 1024
    preconditions:
      - patch paths must be inside allowed_paths
    postconditions:
      - workspace files may change
    cost_hint: medium
    examples:
      - '{"unified_diff":"diff --git a/file b/file\n...","strategy":"reject_on_conflict"}'

  - name: fs.search
    description: Search file contents using regex pattern.
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"pattern":{"type":"string"},"max_results":{"type":"integer","minimum":1,"maximum":2000}},"required":["pattern"]}'
    output_schema: '{"type":"object","properties":{"matches":{"type":"array"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 30
      output_limit_kb: 512
    preconditions:
      - path must be inside allowed_paths
    postconditions:
      - no file system mutation
    cost_hint: medium
    policy:
      path_fields:
        - field: path
          workspace_relative: true
    examples:
      - '{"path":".","pattern":"TODO","max_results":50}'

  - name: conn.list_profiles
    description: List governable external connection profiles visible to the session principal.
    input_schema: '{"type":"object","properties":{},"required":[]}'
    output_schema: '{"type":"object","properties":{"profiles":{"type":"array","items":{"type":"object","properties":{"id":{"type":"string"},"kind":{"type":"string"},"description":{"type":"string"},"read_only":{"type":"boolean"},"scopes":{"type":"object"}}}},"count":{"type":"integer"}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 10
      output_limit_kb: 256
    preconditions:
      - session metadata may restrict allowed profiles
    postconditions:
      - no state mutation
    cost_hint: low
    examples:
      - '{}'

  - name: conn.describe_profile
    description: Describe a specific connection profile (without exposing credentials).
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"}},"required":["profile_id"]}'
    output_schema: '{"type":"object","properties":{"profile":{"type":"object","properties":{"id":{"type":"string"},"kind":{"type":"string"},"description":{"type":"string"},"read_only":{"type":"boolean"},"scopes":{"type":"object"}}}}}'
    scope: workspace
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 10
      output_limit_kb: 128
    preconditions:
      - profile_id must refer to a visible profile
    postconditions:
      - no state mutation
    cost_hint: low
    policy:
      profile_fields:
        - field: profile_id
    examples:
      - '{"profile_id":"dev.redis"}'

  - name: api.benchmark
    description: Run a bounded k6 benchmark against an allowlisted HTTP profile route.
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"request":{"type":"object","properties":{"method":{"type":"string","enum":["GET","HEAD","OPTIONS","POST","PUT","PATCH","DELETE"]},"path":{"type":"string"},"headers":{"type":"object","additionalProperties":{"type":"string"}},"body":{"type":"string"}},"required":["path"]},"load":{"type":"object","properties":{"mode":{"type":"string","enum":["constant_vus","arrival_rate"]},"duration_ms":{"type":"integer","minimum":100,"maximum":60000},"vus":{"type":"integer","minimum":1,"maximum":50},"rps":{"type":"integer","minimum":1,"maximum":200}}},"thresholds":{"type":"object","properties":{"p95_ms":{"type":"number","minimum":1},"error_rate":{"type":"number","minimum":0,"maximum":1},"checks":{"type":"number","minimum":0,"maximum":1}}},"include_raw_metrics":{"type":"boolean"}},"required":["profile_id","request"]}'
    output_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"target_url":{"type":"string"},"request":{"type":"object"},"load":{"type":"object"},"latency_ms":{"type":"object","properties":{"min":{"type":"number"},"avg":{"type":"number"},"p50":{"type":"number"},"p95":{"type":"number"},"p99":{"type":"number"},"max":{"type":"number"}}},"rps_observed":{"type":"number"},"requests":{"type":"integer"},"failed_requests":{"type":"integer"},"error_rate":{"type":"number"},"http_codes":{"type":"object"},"thresholds":{"type":"object","properties":{"passed":{"type":"boolean"},"violations":{"type":"array","items":{"type":"string"}}}},"artifacts":{"type":"object"}}}'
    scope: external
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 120
      output_limit_kb: 4096
    preconditions:
      - profile_id must be an allowlisted http/api profile
      - request.path must be allowlisted by profile routes
    postconditions:
      - k6 benchmark executed with bounded load
      - benchmark artifacts may be generated
    cost_hint: medium
    policy:
      arg_fields:
        - field: request.path
          max_length: 2048
          allowed_prefix:
            - /
          denied_prefix:
            - "http://"
            - "https://"
          deny_characters:
            - "\n"
            - "\r"
      profile_fields:
        - field: profile_id
    examples:
      - '{"profile_id":"bench.workspace","request":{"method":"GET","path":"/healthz","headers":{"accept":"application/json"}},"load":{"mode":"constant_vus","duration_ms":10000,"vus":5},"thresholds":{"p95_ms":1000,"error_rate":0.05,"checks":0.95}}'

  - name: nats.request
    description: Send NATS request/reply call with profile-governed subject limits.
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"subject":{"type":"string"},"payload":{"type":"string"},"payload_encoding":{"type":"string","enum":["utf8","base64"]},"timeout_ms":{"type":"integer","minimum":100,"maximum":10000},"max_bytes":{"type":"integer","minimum":1,"maximum":1048576}},"required":["profile_id","subject"]}'
    output_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"subject":{"type":"string"},"response_base64":{"type":"string"},"response_bytes":{"type":"integer"},"truncated":{"type":"boolean"}}}'
    scope: external
    side_effects: reversible
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 1024
    preconditions:
      - profile_id and subject must be allowlisted
    postconditions:
      - request-reply interaction completed
    cost_hint: medium
    policy:
      profile_fields:
        - field: profile_id
      subject_fields:
        - field: subject
    examples:
      - '{"profile_id":"dev.nats","subject":"sandbox.echo","payload":"hello","payload_encoding":"utf8","timeout_ms":2000}'

  - name: nats.publish
    description: Publish NATS message to an allowlisted subject.
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"subject":{"type":"string"},"payload":{"type":"string"},"payload_encoding":{"type":"string","enum":["utf8","base64"]},"timeout_ms":{"type":"integer","minimum":100,"maximum":10000},"max_bytes":{"type":"integer","minimum":1,"maximum":1048576}},"required":["profile_id","subject"]}'
    output_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"subject":{"type":"string"},"payload_bytes":{"type":"integer"},"payload_encoding":{"type":"string"},"published":{"type":"boolean"}}}'
    scope: external
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 256
    preconditions:
      - profile_id and subject must be allowlisted
    postconditions:
      - message may be published
    cost_hint: medium
    policy:
      profile_fields:
        - field: profile_id
      subject_fields:
        - field: subject
    examples:
      - '{"profile_id":"dev.nats","subject":"sandbox.events","payload":"hello","payload_encoding":"utf8","timeout_ms":2000}'

  - name: nats.subscribe_pull
    description: Pull messages from NATS subject with deterministic limits.
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"subject":{"type":"string"},"max_messages":{"type":"integer","minimum":1,"maximum":100},"max_bytes":{"type":"integer","minimum":1,"maximum":1048576},"timeout_ms":{"type":"integer","minimum":100,"maximum":10000}},"required":["profile_id","subject"]}'
    output_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"subject":{"type":"string"},"messages":{"type":"array","items":{"type":"object","properties":{"subject":{"type":"string"},"data_base64":{"type":"string"},"size_bytes":{"type":"integer"},"data_trimmed":{"type":"boolean"}}}},"message_count":{"type":"integer"},"total_bytes":{"type":"integer"},"truncated":{"type":"boolean"}}}'
    scope: external
    side_effects: none
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 30
      output_limit_kb: 2048
    preconditions:
      - profile_id and subject must be allowlisted
    postconditions:
      - bounded message batch returned
    cost_hint: medium
    policy:
      profile_fields:
        - field: profile_id
      subject_fields:
        - field: subject
    examples:
      - '{"profile_id":"dev.nats","subject":"sandbox.events","max_messages":20,"timeout_ms":2000}'

  - name: kafka.consume
    description: Consume Kafka messages from an allowlisted topic with bounded output.
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"topic":{"type":"string"},"partition":{"type":"integer","minimum":0},"offset_mode":{"type":"string","enum":["earliest","latest","absolute","timestamp"]},"offset":{"oneOf":[{"type":"integer","minimum":0},{"type":"string","enum":["earliest","latest"]}]},"timestamp_ms":{"type":"integer","minimum":0},"max_messages":{"type":"integer","minimum":1,"maximum":200},"max_bytes":{"type":"integer","minimum":1,"maximum":1048576},"timeout_ms":{"type":"integer","minimum":100,"maximum":10000}},"required":["profile_id","topic"]}'
    output_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"topic":{"type":"string"},"offset_mode":{"type":"string"},"offset":{"type":"integer"},"timestamp_ms":{"type":"integer"},"messages":{"type":"array","items":{"type":"object","properties":{"partition":{"type":"integer"},"offset":{"type":"integer"},"timestamp_unix":{"type":"integer"},"key_base64":{"type":"string"},"value_base64":{"type":"string"},"size_bytes":{"type":"integer"},"key_trimmed":{"type":"boolean"},"value_trimmed":{"type":"boolean"}}}},"message_count":{"type":"integer"},"total_bytes":{"type":"integer"},"truncated":{"type":"boolean"}}}'
    scope: external
    side_effects: none
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 30
      output_limit_kb: 2048
    preconditions:
      - profile_id and topic must be allowlisted
    postconditions:
      - bounded message batch returned
    cost_hint: medium
    policy:
      profile_fields:
        - field: profile_id
      topic_fields:
        - field: topic
    examples:
      - '{"profile_id":"dev.kafka","topic":"sandbox.events","partition":0,"offset_mode":"latest","max_messages":20,"timeout_ms":2000}'
      - '{"profile_id":"dev.kafka","topic":"sandbox.events","partition":0,"offset_mode":"absolute","offset":42,"max_messages":20,"timeout_ms":2000}'
      - '{"profile_id":"dev.kafka","topic":"sandbox.events","partition":0,"offset_mode":"timestamp","timestamp_ms":1730000000000,"max_messages":20,"timeout_ms":2000}'

  - name: kafka.produce
    description: Produce Kafka message to an allowlisted topic.
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"topic":{"type":"string"},"partition":{"type":"integer","minimum":0},"key":{"type":"string"},"key_encoding":{"type":"string","enum":["utf8","base64"]},"value":{"type":"string"},"value_encoding":{"type":"string","enum":["utf8","base64"]},"timeout_ms":{"type":"integer","minimum":100,"maximum":10000},"max_bytes":{"type":"integer","minimum":1,"maximum":1048576}},"required":["profile_id","topic"]}'
    output_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"topic":{"type":"string"},"partition":{"type":"integer"},"key_bytes":{"type":"integer"},"value_bytes":{"type":"integer"},"produced":{"type":"boolean"}}}'
    scope: external
    side_effects: reversible
    risk_level: medium
    requires_approval: true
    idempotency: best-effort
    constraints:
      timeout_seconds: 20
      output_limit_kb: 256
    preconditions:
      - profile_id and topic must be allowlisted
    postconditions:
      - message may be produced
    cost_hint: medium
    policy:
      profile_fields:
        - field: profile_id
      topic_fields:
        - field: topic
    examples:
      - '{"profile_id":"dev.kafka","topic":"sandbox.events","partition":0,"key":"k1","value":"hello","value_encoding":"utf8","timeout_ms":2000}'

  - name: kafka.topic_metadata
    description: Describe Kafka topic metadata for an allowlisted topic.
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"topic":{"type":"string"}},"required":["profile_id","topic"]}'
    output_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"topic":{"type":"string"},"partition_count":{"type":"integer"},"partitions":{"type":"array","items":{"type":"object","properties":{"partition":{"type":"integer"},"leader_host":{"type":"string"},"leader_port":{"type":"integer"},"replica_ids":{"type":"array","items":{"type":"integer"}},"isr_ids":{"type":"array","items":{"type":"integer"}},"replica_count":{"type":"integer"},"isr_count":{"type":"integer"}}}}}}'
    scope: external
    side_effects: none
    risk_level: low
    idempotency: guaranteed
    constraints:
      timeout_seconds: 20
      output_limit_kb: 512
    preconditions:
      - profile_id and topic must be allowlisted
    postconditions:
      - no state mutation
    cost_hint: low
    policy:
      profile_fields:
        - field: profile_id
      topic_fields:
        - field: topic
    examples:
      - '{"profile_id":"dev.kafka","topic":"sandbox.events"}'

  - name: rabbit.consume
    description: Consume RabbitMQ messages from an allowlisted queue with bounded output.
    input_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"queue":{"type":"string"},"max_messages":{"type":"integer","minimum":1,"maximum":200},"max_bytes":{"type":"integer","minimum":1,"maximum":1048576},"timeout_ms":{"type":"integer","minimum":100,"maximum":10000}},"required":["profile_id","queue"]}'
    output_schema: '{"type":"object","properties":{"profile_id":{"type":"string"},"queue":{"type":"string"},"messages":{"type":"array","items":{"type":"object","properties":{"exchange":{"type":"string"},"routing_key":{"type":"string"},"redelivered":{"type":"boolean"},"timestamp_unix":{"type":"integer"},"body_base64":{"type":"string"},"size_bytes":{"type":"integer"},"body_trimmed":{"type":"boolean"}}}},"message_count":{"type":"integer"},"total_bytes":{"type":"integer"},"truncated":{"type":"boolean"}}}'
    scope: external
    side_effects: none
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 30
      output_limit_kb: 2048
    preconditions:
      - profile_id and queue must be allowlisted
    postconditions:
      - bounded message batch returned
    cost_hint: medium
    policy:
      profile_fields:
        - field: profile_id
      queue_fields:
        - field: queue
    examples:
      - '{"profile_id":"dev.rabbit","queue":"sandbox.jobs","max_messages":20,"timeout_ms":2000}'

  - name: rabbit.publish
    description: Publish RabbitMQ message to an allowlisted queue/routing key.
