    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Path to test file (e.g. internal/app/service_test.go)"},"pattern":{"type":"string","description":"Test name pattern filter (e.g. TestMyFunction)"},"timeout_seconds":{"type":"integer","minimum":1,"maximum":600,"description":"Test timeout (default 120s)"}},"required":["path"]}'
