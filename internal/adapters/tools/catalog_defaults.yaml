    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path to the file within the workspace"},"ref":{"type":"string","description":"Git ref to diff against (default HEAD). Can be a branch, tag, or commit SHA"},"stat":{"type":"boolean","description":"Include --stat summary (insertions/deletions)"},"context":{"type":"integer","minimum":0,"maximum":50,"description":"Number of context lines around changes (default: git default of 3)"}},"required":["path"]}'
    output_schema: '{"type":"object","properties":{"ref":{"type":"string"},"path":{"type":"string"},"diff":{"type":"string"},"stat":{"type":"string"}}}'
    scope: repo
