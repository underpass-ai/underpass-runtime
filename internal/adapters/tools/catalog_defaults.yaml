      timeout_seconds: 30
      max_retries: 1
      output_limit_kb: 1024
    preconditions:
      - workspace must contain a git repository
    postconditions:
      - no repository mutation
    cost_hint: low
    policy:
      path_fields:
        - field: paths
          multi: true
          workspace_relative: true
    examples:
      - '{"staged":false}'

  - name: git.apply_patch
    description: Apply a unified diff patch using git apply.
    input_schema: '{"type":"object","properties":{"patch":{"type":"string"},"check":{"type":"boolean"}},"required":["patch"]}'
    output_schema: '{"type":"object","properties":{"applied":{"type":"boolean"},"output":{"type":"string"}}}'
    scope: repo
    side_effects: reversible
    risk_level: medium
