    cost_hint: medium
    examples:
      - '{"patch":"diff --git ...","check":true}'

  - name: git.checkout
    description: "Checkout a branch or ref, optionally creating a new branch."
    input_schema: '{"type":"object","properties":{"ref":{"type":"string"},"create":{"type":"boolean"},"start_point":{"type":"string"},"force":{"type":"boolean"}},"required":["ref"]}'
    output_schema: '{"type":"object","properties":{"ref":{"type":"string"},"created":{"type":"boolean"},"output":{"type":"string"}}}'
    scope: repo
    side_effects: reversible
    risk_level: medium
    idempotency: best-effort
    constraints:
      timeout_seconds: 30
      output_limit_kb: 512
    preconditions:
      - workspace must contain a git repository
    postconditions:
      - checked out ref may change working tree
    cost_hint: medium
    policy:
      arg_fields:
        - field: ref
          max_length: 256
          deny_characters:
            - ;
            - "|"
            - "&"
            - "`"
            - $(
            - ">"
            - <
            - "\n"
            - "\r"
        - field: start_point
          max_length: 256
          deny_characters:
            - ;
            - "|"
            - "&"
            - "`"
            - $(
            - ">"
            - <
            - "\n"
            - "\r"
    examples:
      - '{"ref":"feature/new-api"}'
      - '{"ref":"release-2026-02","create":true,"start_point":"origin/main"}'

