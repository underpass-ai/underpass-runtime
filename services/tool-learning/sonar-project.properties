sonar.projectKey=underpass-ai_tool-learning
sonar.organization=underpass-ai-swe-ai-fleet

sonar.sources=.
sonar.exclusions=**/*_test.go,**/testdata/**,**/vendor/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage-full.out

sonar.coverage.minimum=70
sonar.newCode.coverage.minimum=80

# Go test naming convention: TestFoo_SubScenario uses underscores idiomatically.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
